<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpeedU - Semua Link Penting</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome for Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #0068e1; /* Warna biru utama */
        color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 1rem;
      }
      .link-card {
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        background-color: rgba(0, 0, 0, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }
      .link-card:hover {
        transform: translateY(-5px) scale(1.02);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body class="antialiased">
    <main class="w-full max-w-lg mx-auto text-center">
      <!-- Profile Section -->
      <header class="mb-8">
        <a href="#">
          <img
            src="speedulogohitam.png"
            alt="Logo Speedu"
            class="h-9 sm:h-12 mx-auto mb-4"
            onerror="this.onerror=null;this.src='https://placehold.co/150x50/0068e1/FFFFFF?text=LOGO';"
          />
        </a>
        <p class="text-lg text-gray-200 mt-1">BELAJAR BARENG CPNS 2026</p>
      </header>

      <!-- Links Section -->
      <div class="space-y-4">
        <!-- Link 1: Pendaftaran Bimbel -->
        <a
          href="https://chat.whatsapp.com/Gg1lsEREJoSHTqVGrMMg0R"
          target="_blank"
          class="link-card flex items-center p-4 rounded-xl w-full"
        >
          <i class="fas fa-graduation-cap fa-lg w-10 text-yellow-400"></i>
          <span class="flex-grow text-lg font-semibold text-left"
            >GRUP PERSIAPAN CPNS 2026 DAN SOAL SOAL SIMULASI CPNS 2026</span
          >
          <i class="fas fa-arrow-right"></i>
        </a>
      </div>

      <!-- Footer -->
      <footer class="mt-12 text-center">
        <p class="text-sm text-gray-300">
          &copy; 2025 SPEEDU. Hak cipta dilindungi.
        </p>
      </footer>
    </main>
  </body>
</html>
